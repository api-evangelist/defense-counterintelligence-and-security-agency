description: >-
  The Defense Counterintelligence and Security Agency (DCSA) is the largest
  security agency in the federal government, dedicated to protecting America's
  trusted workforce and trusted workspaces. DCSA conducts personnel vetting
  and background investigations, oversees the National Industrial Security
  Program, delivers counterintelligence and insider threat support, and
  operates systems such as the Defense Information System for Security (DISS)
  and the National Background Investigation Services (NBIS). DCSA does not
  currently expose a public developer API; access to its mission systems is
  limited to authorized government users and cleared industry partners.
